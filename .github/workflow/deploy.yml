name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/evaluacion-nginx:latest .

    - name: Push
      run: docker push ${{ secrets.DOCKER_USERNAME }}/evaluacion-nginx:latest
